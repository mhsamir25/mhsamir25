name: Update Problem Stats

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate fancy stats and update README
        run: |
          git clone https://github.com/mhsamir25/Problems-solved-by-me.git temp_repo

          # Auto-detect all rated_* folders for Codeforces
          CODEFORCES=0
          for dir in temp_repo/rated_*; do
            if [ -d "$dir" ]; then
              COUNT=$(find "$dir" -type f 2>/dev/null | wc -l)
              CODEFORCES=$((CODEFORCES + COUNT))
            fi
          done

          ATCODER=$(find temp_repo/atcoder -type f 2>/dev/null | wc -l)
          CSES=$(find temp_repo/cses -type f 2>/dev/null | wc -l)
          LEETCODE=$(find temp_repo/leetcode -type f 2>/dev/null | wc -l)
          TOTAL=$((CODEFORCES + ATCODER + CSES + LEETCODE))

          # Write the fancy stats block to a temp file using printf (no heredoc)
          printf '<div align="center">\n\n## 🏆 Problem Solving Stats  \n\n| Platform | Problems Solved |\n|:---:|:---:|\n| 🔴 Codeforces | **%d** |\n| 🔵 AtCoder | **%d** |\n| 🟢 CSES | **%d** |\n| 🟠 LeetCode | **%d** |\n| **🔥 Total** | **%d** |\n\n<sub>📊 Auto‑updated every 2 hours</sub>\n\n</div>\n' \
          "$CODEFORCES" "$ATCODER" "$CSES" "$LEETCODE" "$TOTAL" > /tmp/stats.md

          # Insert the block exactly between the markers
          sed -i "/<!-- STATS_START -->/,/<!-- STATS_END -->/{//!d}" README.md
          sed -i "/<!-- STATS_START -->/r /tmp/stats.md" README.md

          rm -rf temp_repo /tmp/stats.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "✨ Update fancy problem solving stats"
          git push
